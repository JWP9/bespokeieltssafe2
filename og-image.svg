<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-banner" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="180" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="tagline-grad" x1="180" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-banner)"/>

  <circle cx="1050" cy="80" r="200" fill="#0d9488" opacity="0.06"/>
  <circle cx="150" cy="550" r="160" fill="#2563eb" opacity="0.07"/>
  <circle cx="1150" cy="550" r="120" fill="#5eead4" opacity="0.04"/>

  <rect x="72" y="215" width="200" height="200" rx="44" fill="url(#icon-bg)" filter="url(#glow)"/>
  <text
    x="172"
    y="348"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="120"
    fill="white"
    letter-spacing="-4"
  >B</text>
  <path
    d="M 122 388 Q 172 408 222 388"
    stroke="url(#accent-grad)"
    stroke-width="8"
    stroke-linecap="round"
    fill="none"
    opacity="0.8"
  />

  <text
    x="316"
    y="305"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="100"
    fill="url(#text-grad)"
    letter-spacing="-2"
  >Bespoke IELTS</text>

  <text
    x="316"
    y="370"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="500"
    font-size="36"
    fill="url(#tagline-grad)"
    letter-spacing="6"
  >EXPERT COACHING</text>

  <rect x="316" y="395" width="680" height="2" fill="url(#tagline-grad)" opacity="0.3" rx="1"/>

  <text
    x="316"
    y="440"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="400"
    font-size="28"
    fill="white"
    opacity="0.55"
    letter-spacing="1"
  >Personalised IELTS preparation for Band 7+</text>
</svg>
